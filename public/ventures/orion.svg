<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Orion — play-to-earn gaming">
  <defs>
    <linearGradient id="obg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12101c"/>
      <stop offset="55%" stop-color="#191430"/>
      <stop offset="100%" stop-color="#0c0b14"/>
    </linearGradient>
    <radialGradient id="oglow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ohex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ofade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.85"/>
    </linearGradient>
    <pattern id="ogrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#a78bfa" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#obg)"/>
  <rect width="1280" height="720" fill="url(#ogrid)"/>
  <rect width="1280" height="720" fill="url(#oglow)"/>

  <!-- descending market line: the crash that ended it -->
  <path d="M96 300 L232 348 L368 322 L504 396 L640 372 L776 486 L912 552 L1048 596 L1184 616"
        fill="none" stroke="url(#ofade)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <path d="M96 300 L232 348 L368 322 L504 396 L640 372 L776 486 L912 552 L1048 596 L1184 616 L1184 720 L96 720 Z"
        fill="#f43f5e" opacity="0.05"/>

  <!-- token hexes -->
  <g transform="translate(640 300)">
    <g opacity="0.16">
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" fill="none" stroke="#a78bfa" stroke-width="2"/>
    </g>
    <polygon points="0,-104 90,-52 90,52 0,104 -90,52 -90,-52" fill="none" stroke="url(#ohex)" stroke-width="4"/>
    <polygon points="0,-58 50,-29 50,29 0,58 -50,29 -50,-29" fill="#a78bfa" opacity="0.18"/>
    <polygon points="0,-58 50,-29 50,29 0,58 -50,29 -50,-29" fill="none" stroke="#ddd6fe" stroke-width="2.5"/>
  </g>

  <!-- scattered smaller tokens, thinning out to the right -->
  <g fill="none" stroke="#a78bfa" stroke-width="2">
    <polygon points="300,168 322,181 322,207 300,220 278,207 278,181" opacity="0.5"/>
    <polygon points="1010,206 1028,216 1028,236 1010,246 992,236 992,216" opacity="0.28"/>
    <polygon points="204,520 220,529 220,547 204,556 188,547 188,529" opacity="0.22"/>
    <polygon points="1120,398 1134,406 1134,422 1120,430 1106,422 1106,406" opacity="0.16"/>
  </g>

  <text x="96" y="122" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" letter-spacing="7" fill="#a78bfa" opacity="0.9">PLAY TO EARN</text>
  <text x="96" y="180" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="58" font-weight="600" letter-spacing="-1.5" fill="#f4f2fa">Orion</text>
</svg>
